<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agendamento — Lord Barbearia</title>
<style>
:root{
  --bg:#0d0d0f;--card:#17171a;--line:#27272c;--txt:#f0f0f0;--mut:#8a8a95;
  --gold:#d4af37;--gold-b:rgba(212,175,55,.35);--green:#3dd68c;--red:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:var(--txt);
  background:radial-gradient(circle at top,rgba(212,175,55,.10),transparent 32%),linear-gradient(135deg,#080808,#101013 55%,#090909);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.container{width:100%;max-width:520px}
.logo-area{text-align:center;margin-bottom:22px}
.logo-wrap{width:146px;height:146px;margin:0 auto 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 42px rgba(212,175,55,.32)}
.logo-wrap:before,.logo-wrap:after{content:"";position:absolute;border-radius:50%;pointer-events:none}
.logo-wrap:before{inset:-6px;border:1.5px solid var(--gold-b);animation:ring 14s linear infinite}
.logo-wrap:after{inset:-13px;border:1px solid rgba(212,175,55,.18);animation:ring 22s linear infinite reverse}
.logo-wrap img{width:126px;height:126px;object-fit:cover;border-radius:50%;border:2px solid var(--gold)}
@keyframes ring{from{transform:rotate(0)}to{transform:rotate(360deg)}}
h1{font-size:25px;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.logo-area p{margin-top:6px;color:var(--mut);font-size:14px}
.card{background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 25px 70px rgba(0,0,0,.48)}
.card h2{color:var(--gold);font-size:22px;margin-bottom:8px}
.subtitle{color:var(--mut);font-size:14px;line-height:1.45;margin-bottom:18px}
label{display:block;color:var(--mut);font-size:13px;margin:12px 0 6px}
input,select,textarea{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:#0d0d0f;color:var(--txt);font-size:15px;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.10)}
textarea{min-height:86px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{width:100%;border:0;margin-top:18px;padding:14px;border-radius:13px;background:var(--gold);color:#111;font-weight:800;cursor:pointer;font-size:15px;transition:.15s}
button:hover{filter:brightness(1.08);transform:translateY(-1px)}
button:disabled{opacity:.65;cursor:not-allowed;transform:none}
.msg{margin-top:14px;padding:13px;border-radius:12px;display:none;font-size:14px;line-height:1.45}
.msg.ok{display:block;background:rgba(61,214,140,.12);border:1px solid rgba(61,214,140,.35);color:var(--green)}
.msg.err{display:block;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.35);color:#ff7f72}
.footer{text-align:center;margin-top:18px;color:var(--mut);font-size:12px}
.footer b{color:var(--gold)}
@media(max-width:560px){
  body{
    padding:14px;
    align-items:flex-start;
  }
  .container{
    max-width:100%;
  }
  .logo-area{
    margin-bottom:16px;
    padding-top:6px;
  }
  .logo-wrap{
    width:118px;
    height:118px;
    margin-bottom:12px;
  }
  .logo-wrap img{
    width:102px;
    height:102px;
  }
  .logo-wrap:before{
    inset:-5px;
  }
  .logo-wrap:after{
    inset:-10px;
  }
  h1{
    font-size:20px;
    letter-spacing:2.5px;
  }
  .logo-area p{
    font-size:13px;
  }
  .card{
    padding:18px;
    border-radius:18px;
  }
  .card h2{
    font-size:21px;
  }
  .subtitle{
    font-size:13.5px;
    margin-bottom:14px;
  }
  .row{
    grid-template-columns:1fr;
    gap:0;
  }
  label{
    font-size:13px;
    margin-top:11px;
  }
  input,select,textarea{
    font-size:16px;
    padding:14px;
    border-radius:13px;
  }
  textarea{
    min-height:82px;
  }
  button{
    padding:15px;
    font-size:16px;
    border-radius:14px;
  }
  .msg{
    font-size:13.5px;
  }
  .footer{
    font-size:11.5px;
    margin-top:14px;
    padding-bottom:10px;
  }
}

@media(max-width:380px){
  body{
    padding:10px;
  }
  .card{
    padding:16px;
  }
  .logo-wrap{
    width:104px;
    height:104px;
  }
  .logo-wrap img{
    width:90px;
    height:90px;
  }
  h1{
    font-size:18px;
    letter-spacing:2px;
  }
}

  /* Integração com Gestão de Agendamentos */
  .field-help{
    color:#9b9ba3;
    font-size:12px;
    line-height:1.4;
    margin-top:6px;
    min-height:16px;
  }
  .field-help.ok{color:#3dd68c}
  .field-help.err{color:#ff7f72}
  .field-help.gold{color:#d4af37}
  select:disabled,input:disabled,button:disabled{
    opacity:.62;
    cursor:not-allowed;
  }
  .agenda-info-box{
    margin:12px 0 2px;
    border:1px solid rgba(212,175,55,.24);
    background:rgba(212,175,55,.07);
    border-radius:13px;
    padding:11px 12px;
    color:#d4af37;
    font-size:12.8px;
    line-height:1.45;
    display:none;
  }
  .agenda-info-box.show{display:block}

</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAbUtusz-gIIJUBzhm0V_nvxPJYXz7V9og",
  authDomain: "lordbarbeariav1.firebaseapp.com",
  projectId: "lordbarbeariav1",
  storageBucket: "lordbarbeariav1.firebasestorage.app",
  messagingSenderId: "567317147157",
  appId: "1:567317147157:web:a6c550bd0203f18825681c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const WHATSAPP_BARBEARIA = "5583991552729";

const form = document.getElementById("formAgendamento");
const msg = document.getElementById("msg");
const btn = document.getElementById("btnAgendar");
const campoBarbeiro = document.getElementById("barbeiro");
const campoData = document.getElementById("data");
const campoHora = document.getElementById("hora");
const barbeiroHelp = document.getElementById("barbeiroHelp");
const agendaInfo = document.getElementById("agendaInfo");

let configAgenda = {
  barbeiros: [],
  horariosDataBarbeiro: {},
  diasFechadosBarbeiro: {}
};

const hoje = new Date();
const yyyy = hoje.getFullYear();
const mm = String(hoje.getMonth() + 1).padStart(2, "0");
const dd = String(hoje.getDate()).padStart(2, "0");
campoData.min = `${yyyy}-${mm}-${dd}`;

function mostrarMsg(texto, tipo){
  msg.className = "msg " + tipo;
  msg.textContent = texto;
}

function setHelp(el, texto, tipo=""){
  if(!el)return;
  el.className = "field-help " + tipo;
  el.textContent = texto || "";
}

function dataBR(iso){
  if(!iso)return "";
  const p = String(iso).split("-");
  if(p.length !== 3)return iso;
  return p.reverse().join("/");
}

function diaSemana(iso){
  if(!iso)return "";
  const p = String(iso).split("-").map(Number);
  if(p.length !== 3 || p.some(n => !Number.isFinite(n)))return "";
  const dt = new Date(p[0], p[1]-1, p[2]);
  if(Number.isNaN(dt.getTime()))return "";
  return dt.toLocaleDateString("pt-BR", {weekday:"long"}).replace(/^./, c => c.toUpperCase());
}

function limparHorarios(texto="Selecione barbeiro e data"){
  campoHora.innerHTML = `<option value="">${texto}</option>`;
  campoHora.disabled = true;
}

function mostrarAgendaInfo(texto, tipo="gold"){
  if(!agendaInfo)return;
  agendaInfo.className = "agenda-info-box show";
  agendaInfo.textContent = texto;
  if(tipo === "err"){
    agendaInfo.style.borderColor = "rgba(231,76,60,.35)";
    agendaInfo.style.background = "rgba(231,76,60,.08)";
    agendaInfo.style.color = "#ff7f72";
  }else{
    agendaInfo.style.borderColor = "rgba(212,175,55,.24)";
    agendaInfo.style.background = "rgba(212,175,55,.07)";
    agendaInfo.style.color = "#d4af37";
  }
}

function esconderAgendaInfo(){
  if(!agendaInfo)return;
  agendaInfo.className = "agenda-info-box";
  agendaInfo.textContent = "";
}

async function carregarConfiguracaoAgenda(){
  try{
    setHelp(barbeiroHelp, "Carregando barbeiros da gestão...", "gold");
    const doc = await db.collection("configuracoes").doc("agendamento").get();

    if(doc.exists){
      const data = doc.data() || {};
      configAgenda.barbeiros = Array.isArray(data.barbeiros) ? data.barbeiros : [];
      configAgenda.horariosDataBarbeiro = data.horariosDataBarbeiro && typeof data.horariosDataBarbeiro === "object" ? data.horariosDataBarbeiro : {};
      configAgenda.diasFechadosBarbeiro = data.diasFechadosBarbeiro && typeof data.diasFechadosBarbeiro === "object" ? data.diasFechadosBarbeiro : {};
    }

    const barbeirosAtivos = configAgenda.barbeiros.filter(b => b && b.ativo !== false);

    if(!barbeirosAtivos.length){
      campoBarbeiro.innerHTML = `<option value="">Nenhum barbeiro disponível</option>`;
      campoBarbeiro.disabled = true;
      limparHorarios("Sem horários disponíveis");
      setHelp(barbeiroHelp, "Nenhum barbeiro foi cadastrado na gestão ainda.", "err");
      return;
    }

    campoBarbeiro.innerHTML =
      `<option value="">Selecione o barbeiro</option>` +
      barbeirosAtivos.map(b => `<option value="${b.id}">${b.nome}</option>`).join("");

    campoBarbeiro.disabled = false;
    setHelp(barbeiroHelp, "Escolha o barbeiro para ver os horários disponíveis.", "ok");
  }catch(error){
    console.error(error);
    campoBarbeiro.innerHTML = `<option value="">Erro ao carregar barbeiros</option>`;
    campoBarbeiro.disabled = true;
    limparHorarios("Erro ao carregar");
    setHelp(barbeiroHelp, "Erro ao carregar agenda. Verifique a conexão ou o Firebase.", "err");
  }
}

async function buscarHorariosOcupados(barbeiroId, data){
  try{
    const snap = await db.collection("agendamentos")
      .where("barbeiroId", "==", barbeiroId)
      .where("data", "==", data)
      .get();

    const ocupados = new Set();
    snap.forEach(doc => {
      const ag = doc.data() || {};
      const status = String(ag.status || "").toLowerCase();
      if(status !== "cancelado" && status !== "cancelada"){
        ocupados.add(ag.hora);
      }
    });
    return ocupados;
  }catch(error){
    console.error(error);
    return new Set();
  }
}

async function carregarHorariosDisponiveis(){
  const barbeiroId = campoBarbeiro.value;
  const data = campoData.value;
  esconderAgendaInfo();
  limparHorarios();

  if(!barbeiroId || !data)return;

  const barbeiro = configAgenda.barbeiros.find(b => b.id === barbeiroId);
  if(!barbeiro){
    limparHorarios("Barbeiro inválido");
    return;
  }

  const fechado = configAgenda.diasFechadosBarbeiro?.[data]?.[barbeiroId];
  if(fechado){
    limparHorarios("Agenda fechada");
    mostrarAgendaInfo(`${barbeiro.nome} está com a agenda fechada em ${dataBR(data)} (${diaSemana(data)}).`, "err");
    return;
  }

  const lista = configAgenda.horariosDataBarbeiro?.[data]?.[barbeiroId] || [];
  const horarios = lista
    .map(h => typeof h === "string" ? h : h.hora)
    .filter(Boolean)
    .sort((a,b) => a.localeCompare(b));

  if(!horarios.length){
    limparHorarios("Nenhum horário nessa data");
    mostrarAgendaInfo(`Nenhum horário liberado para ${barbeiro.nome} em ${dataBR(data)}.`, "err");
    return;
  }

  campoHora.innerHTML = `<option value="">Carregando disponibilidade...</option>`;
  campoHora.disabled = true;

  const ocupados = await buscarHorariosOcupados(barbeiroId, data);
  const livres = horarios.filter(h => !ocupados.has(h));

  if(!livres.length){
    limparHorarios("Todos os horários ocupados");
    mostrarAgendaInfo(`Todos os horários de ${barbeiro.nome} em ${dataBR(data)} já estão ocupados.`, "err");
    return;
  }

  campoHora.innerHTML =
    `<option value="">Selecione o horário</option>` +
    livres.map(h => `<option value="${h}">${h}</option>`).join("");

  campoHora.disabled = false;
  mostrarAgendaInfo(`${livres.length} horário(s) disponível(is) para ${barbeiro.nome} em ${dataBR(data)} (${diaSemana(data)}).`, "gold");
}

campoBarbeiro.addEventListener("change", carregarHorariosDisponiveis);
campoData.addEventListener("change", carregarHorariosDisponiveis);

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const servico = document.getElementById("servico").value;
  const barbeiroId = campoBarbeiro.value;
  const data = campoData.value;
  const hora = campoHora.value;
  const obs = document.getElementById("obs").value.trim();

  const barbeiro = configAgenda.barbeiros.find(b => b.id === barbeiroId);
  const barbeiroNome = barbeiro ? barbeiro.nome : "";

  if(!nome || !telefone || !servico || !barbeiroId || !data || !hora){
    mostrarMsg("Preencha nome, WhatsApp, serviço, barbeiro, data e horário.", "err");
    return;
  }

  const fechado = configAgenda.diasFechadosBarbeiro?.[data]?.[barbeiroId];
  if(fechado){
    mostrarMsg("Essa agenda está fechada para a data escolhida.", "err");
    await carregarHorariosDisponiveis();
    return;
  }

  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {
    const ocupados = await buscarHorariosOcupados(barbeiroId, data);
    if(ocupados.has(hora)){
      mostrarMsg("Esse horário acabou de ser ocupado. Escolha outro horário.", "err");
      await carregarHorariosDisponiveis();
      return;
    }

    await db.collection("agendamentos").add({
      nome,
      telefone,
      servico,
      barbeiroId,
      barbeiroNome,
      data,
      hora,
      obs,
      status: "Pendente",
      origem: "cliente",
      createdAt: new Date().toISOString(),
      createdAtMs: Date.now()
    });

    const mensagemWhatsApp =
      "📅 *NOVO AGENDAMENTO - LORD BARBEARIA*\n\n" +
      "*Cliente:* " + nome + "\n" +
      "*WhatsApp:* " + telefone + "\n" +
      "*Serviço:* " + servico + "\n" +
      "*Barbeiro:* " + barbeiroNome + "\n" +
      "*Data:* " + dataBR(data) + "\n" +
      "*Horário:* " + hora + "\n" +
      (obs ? "*Observação:* " + obs + "\n" : "") +
      "\n*Status:* Pendente";

    const linkWhatsApp = "https://wa.me/" + WHATSAPP_BARBEARIA + "?text=" + encodeURIComponent(mensagemWhatsApp);

    form.reset();
    await carregarHorariosDisponiveis();
    mostrarMsg("Agendamento enviado com sucesso! Agora envie a confirmação pelo WhatsApp.", "ok");

    setTimeout(() => {
      window.location.href = linkWhatsApp;
    }, 700);
  } catch(error) {
    console.error(error);
    mostrarMsg("Erro ao enviar agendamento. Tente novamente em alguns instantes.", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Solicitar Agendamento";
  }
});

carregarConfiguracaoAgenda();
</script>
</body>
</html>
